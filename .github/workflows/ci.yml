# ─── Continuous Integration ───────────────────────────────────

name: 🚀 Continuous Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CLICOLOR_FORCE: 1

jobs:
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
      ansible: ${{ steps.filter.outputs.ansible }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'
            ansible:
              - 'ansible/**'

  # ─── Terraform ───────────────────────────────────────────────

  terraform-validate:
    name: 🔍 Terraform Validate
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
      - run: terraform -chdir=terraform init -backend=false
      - run: terraform -chdir=terraform validate

  terraform-lint:
    name: 📐 Terraform Lint
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: terraform-linters/setup-tflint@v6
      - run: tflint --chdir=terraform --init
      - run: tflint --chdir=terraform --format compact

  terraform-security:
    name: 🛡️ Terraform Security
    needs: changes
    if: needs.changes.outputs.terraform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/setup-trivy@v0.2.6
      - run: trivy config .

  # ─── Ansible ─────────────────────────────────────────────────

  ansible-lint:
    name: 📜 Ansible Lint
    needs: changes
    if: needs.changes.outputs.ansible == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ansible-lint
      - run: ansible-galaxy collection install community.general ansible.posix
      - run: ansible-lint ansible/playbooks/

  # ─── General ─────────────────────────────────────────────────

  format-check:
    name: 🚨 Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
      - run: npm install -g prettier
      - uses: hashicorp/setup-terraform@v4
      - run: prettier --check . && terraform fmt -check -recursive

  conventional-commit:
    name: ✅ Conventional Commit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
