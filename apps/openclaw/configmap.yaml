apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      "models": {
        "providers": {
          "opencode-zen": {
            "baseUrl": "https://opencode.ai/zen/v1",
            "apiKey": "${OPENCODE_ZEN_API_KEY}",
            "api": "openai-completions",
            "models": [
              { "id": "big-pickle", "name": "Big Pickle" }
            ]
          },
          "openrouter": {
            "baseUrl": "https://openrouter.ai/api/v1",
            "apiKey": "${OPENROUTER_API_KEY}",
            "api": "openai-completions",
            "models": [
              { "id": "kimi-k2.6", "name": "Kimi K2.6" }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "opencode-zen/big-pickle",
            "fallbacks": ["openrouter/kimi-k2.6"]
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "botToken": "${TELEGRAM_BOT_TOKEN}"
        }
      },
      "gateway": {
        "bind": "lan",
        "port": 18789
      }
    }
