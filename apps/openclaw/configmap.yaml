apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
  openclaw.json: |
    {
      "models": {
        "providers": {
          "opencode-zen": {
            "baseUrl": "https://opencode.ai/zen/v1",
            "apiKey": "${OPENCODE_ZEN_API_KEY}",
            "api": "openai-completions",
            "models": [
              { "id": "big-pickle", "name": "Big Pickle" }
            ]
          },
          "openrouter": {
            "baseUrl": "https://openrouter.ai/api/v1",
            "apiKey": "${OPENROUTER_API_KEY}",
            "api": "openai-completions",
            "models": [
              { "id": "moonshotai/kimi-k2.6", "name": "Kimi K2.6" }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "opencode-zen/big-pickle",
            "fallbacks": ["openrouter/moonshotai/kimi-k2.6"]
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "botToken": "${TELEGRAM_BOT_TOKEN}"
        }
      },
      "gateway": {
        "bind": "lan",
        "mode": "local",
        "trustedProxies": ["10.42.0.0/16"],
        "controlUi": {
          "allowedOrigins": [
            "http://localhost:18789",
            "http://127.0.0.1:18789",
            "http://openclaw.192.168.1.155.sslip.io",
            "https://openclaw.192.168.1.155.sslip.io"
          ]
        }
      }
    }
