apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
  labels:
    app: openclaw
data:
  AGENTS.md: |
    # OpenClaw Assistant

    You are a helpful AI assistant running in Kubernetes.
  openclaw.json: |
    {
      "models": {
        "providers": {
          "openrouter": {
            "baseUrl": "https://openrouter.ai/api/v1",
            "apiKey": "${OPENROUTER_API_KEY}",
            "api": "openai-completions",
            "models": [
              { "id": "deepseek/deepseek-v4-flash:free", "name": "DeepSeek V4 Flash (free)" },
              { "id": "google/gemini-3.1-flash-lite", "name": "Gemini 3.1 Flash Lite" },
              { "id": "qwen/qwen3.6-flash", "name": "Qwen 3.6 Flash" },
              { "id": "moonshotai/kimi-k2.6", "name": "Kimi K2.6" }
            ]
          }
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "openrouter/deepseek/deepseek-v4-flash:free",
            "fallbacks": [
              "openrouter/google/gemini-3.1-flash-lite",
              "openrouter/qwen/qwen3.6-flash",
              "openrouter/moonshotai/kimi-k2.6"
            ]
          }
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "botToken": "${TELEGRAM_BOT_TOKEN}"
        }
      },
      "gateway": {
        "bind": "lan",
        "mode": "local",
        "trustedProxies": ["10.42.0.0/16"],
        "auth": {
          "mode": "token",
          "token": "${OPENCLAW_GATEWAY_TOKEN}"
        },
        "controlUi": {
          "enabled": true,
          "allowedOrigins": ["https://openclaw.juanmiguelbesada.com"]
        }
      }
    }
