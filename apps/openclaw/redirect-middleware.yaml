apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: openclaw
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw-http
  namespace: openclaw
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`openclaw.192.168.1.155.sslip.io`)
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: openclaw
          port: 18789
