apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openclaw
  namespace: openclaw
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`openclaw.192.168.1.155.sslip.io`)
      kind: Rule
      services:
        - name: openclaw
          port: 18789
  tls:
    secretName: openclaw-tls
