apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: ensure-config
          image: busybox:1.36
          volumeMounts:
            - name: config-tmpl
              mountPath: /config-tmpl
            - name: data
              mountPath: /home/node/.openclaw
          command:
            - /bin/sh
            - -c
            - |
              if [ ! -f /home/node/.openclaw/openclaw.json ] || \
                 grep -q '__OPENCODE_ZEN_API_KEY__' /home/node/.openclaw/openclaw.json 2>/dev/null; then
                cp /config-tmpl/openclaw.json /home/node/.openclaw/openclaw.json
              fi
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:latest
          env:
            - name: OPENCODE_ZEN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: opencode-zen-api-key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: openrouter-api-key
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: telegram-bot-token
          args:
            - node
            - openclaw.mjs
            - gateway
            - --bind
            - lan
            - --allow-unconfigured
          ports:
            - containerPort: 18789
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
      volumes:
        - name: config-tmpl
          configMap:
            name: openclaw-config
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
