apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: inject-config
          image: busybox:1.36
          env:
            - name: OPENCODE_ZEN_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: opencode-zen-api-key
            - name: OPENROUTER_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: openrouter-api-key
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: telegram-bot-token
          volumeMounts:
            - name: config-tmpl
              mountPath: /config-tmpl
            - name: data
              mountPath: /home/node/.openclaw
          command:
            - /bin/sh
            - -c
            - |
              sed "s/__OPENCODE_ZEN_API_KEY__/$OPENCODE_ZEN_KEY/g; s/__OPENROUTER_API_KEY__/$OPENROUTER_KEY/g; s/__TELEGRAM_BOT_TOKEN__/$TELEGRAM_BOT_TOKEN/g" \
                /config-tmpl/openclaw.json > /home/node/.openclaw/openclaw.json
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:latest
          args:
            - node
            - openclaw.mjs
            - gateway
            - --bind
            - lan
            - --allow-unconfigured
          ports:
            - containerPort: 18789
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
      volumes:
        - name: config-tmpl
          configMap:
            name: openclaw-config
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
