apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app: home-assistant
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: home-assistant
  template:
    metadata:
      labels:
        app: home-assistant
    spec:
      automountServiceAccountToken: false
      initContainers:
        - name: init-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              if [ ! -f /config/configuration.yaml ]; then
                cp /config-template/configuration.yaml /config/configuration.yaml
              elif ! grep -q "use_x_forwarded_for" /config/configuration.yaml 2>/dev/null; then
                cat /config-template/http-config.yaml >> /config/configuration.yaml
              fi
          volumeMounts:
            - name: data
              mountPath: /config
            - name: config
              mountPath: /config-template
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:stable
          env:
            - name: TZ
              value: Europe/Madrid
          ports:
            - name: http
              containerPort: 8123
          resources:
            requests:
              memory: 256Mi
              cpu: 200m
            limits:
              memory: 1Gi
              cpu: "1"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: data
              mountPath: /config
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: home-assistant-data
        - name: config
          configMap:
            name: ha-config
